<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flash Archive</title>

  <style>
    html, body {
      margin: 0;
      background: black;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #container {
      width: 100vw;
      height: 100vh;
      overflow: auto;
      cursor: grab;
    }

    img {
      width: 5000px;
      display: block;
    }
  </style>
</head>

<body>
  <div id="container">
    <img src="flash.jpg">
  </div>
</body>
</html>
