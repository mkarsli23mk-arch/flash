<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flash Archive</title>

  <style>
    html, body {
      margin: 0;
      background: black;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

#container {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: auto;
  background: black;
}

img {
  max-width: 100%;
  max-height: 100vh;
  object-fit: contain;
  display: block;
  margin: auto;
}
  </style>
</head>

<body>
  <div id="container">
    <img src="flash.jpg">
  </div>
</body>
</html>
